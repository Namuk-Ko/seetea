<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SEETEA — 나에게 맞는 티</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }

/* ══ 선택 화면 ══ */
#select {
  position: fixed; inset: 0;
  background: #0F0D0A;
  display: flex; flex-direction: column; align-items: center;
  overflow-y: auto;
  transition: opacity 0.3s;
}
#select.hide { opacity: 0; pointer-events: none; }

.s-wordmark {
  width: 100%; max-width: 420px;
  padding: 1.75rem 1.25rem 0;
  text-align: center;
  flex-shrink: 0;
}

.s-center {
  flex: 1;
  width: 100%; max-width: 420px;
  padding: 0 1.25rem 2rem;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1.5rem;
}
.s-question { font-size: 16px; font-weight: 500; color: #fff; text-align: center; }

.sit-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; width: 100%; }
.sit-btn {
  background: #1E1C19; color: #fff;
  border: none; border-radius: 12px;
  padding: 0.85rem 0.7rem 0.9rem;
  min-height: 96px;
  display: flex; flex-direction: column;
  align-items: flex-start; justify-content: flex-end;
  cursor: pointer; text-align: left;
  transition: transform 0.14s, background 0.14s;
  -webkit-tap-highlight-color: transparent;
  position: relative; overflow: hidden;
}
.sit-btn:hover  { background: #2A2824; }
.sit-btn:active { transform: scale(0.96); }
.sit-btn-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 12px 12px 0 0; }
.sit-btn-text { font-size: 11.5px; font-weight: 500; line-height: 1.45; color: #fff; }
.sit-btn-sub  { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 3px; }

/* ══ 결과 화면 ══ */
#result {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.45s cubic-bezier(0.22,1,0.36,1);
}
#result.open { transform: translateY(0); }

.r-bg {
  position: fixed; inset: 0; z-index: -1;
  background-size: cover; background-position: center top;
}

.r-inner {
  width: 100%; max-width: 420px;
  padding: 0 1.4rem 3rem;
  display: flex; flex-direction: column; align-items: center;
}

.r-header { padding: 1.75rem 0 0; text-align: center; margin-bottom: 1.5rem; width: 100%; }
.r-wm     { font-family: 'Playfair Display', serif; font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; display: block; margin-bottom: 2px; }
.r-wm-sub { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; display: block; opacity: 0.45; }

.r-city    { font-family: 'Playfair Display', serif; font-size: 44px; font-weight: 700; text-align: center; line-height: 1; margin-bottom: 0.5rem; letter-spacing: -0.01em; }
.r-type-ko { font-size: 15px; font-weight: 500; text-align: center; display: block; opacity: 0.85; }
.r-type-en { font-family: 'Playfair Display', serif; font-style: italic; font-size: 14px; text-align: center; display: block; margin-top: 1px; margin-bottom: 1.5rem; opacity: 0.6; }

.r-divider { width: 100%; height: 1px; margin-bottom: 1.25rem; opacity: 0.2; }

.r-tags-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; margin-bottom: 10px; }
.r-tag-card  { border-radius: 10px; padding: 0.7rem 0.9rem; font-size: 12px; font-weight: 400; line-height: 1.4; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }

.brew-card  { width: 100%; border-radius: 10px; padding: 0.9rem 1rem; margin-bottom: 1.25rem; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
.brew-title { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 8px; opacity: 0.5; }
.brew-rows  { display: flex; flex-direction: column; gap: 6px; }
.brew-row   { display: flex; align-items: flex-start; gap: 10px; }
.brew-icon  { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.brew-text  { font-size: 12px; font-weight: 400; line-height: 1.55; opacity: 0.85; }

.btn-shop {
  display: block; width: 100%; padding: 14px; border-radius: 10px;
  border: 1.5px solid; background: transparent; cursor: pointer;
  font-size: 13px; font-weight: 500; letter-spacing: 0.05em;
  text-align: center; text-decoration: none;
  margin-bottom: 10px; transition: background 0.2s;
}
.btn-back {
  background: none; border: none; cursor: pointer;
  font-size: 12px; padding: 8px; letter-spacing: 0.04em;
  opacity: 0.4; transition: opacity 0.2s;
}
.btn-back:hover { opacity: 0.8; }
</style>
</head>

const COLORS = { seoul:'#f7c766', tokyo:'#eda9d2', barcelona:'#cc4e38', mosbach:'#efebe1' };

const SITUATIONS = [
  { text:'아침에\n집중이 필요해',    sub:'#에너지',     city:'seoul'     },
  { text:'달달한 게\n당길 때',       sub:'#디저트',     city:'tokyo'     },
  { text:'자기 전에\n릴렉스',        sub:'#슬리핑',     city:'mosbach'   },
  { text:'밥 먹고\n나른할 때',       sub:'#리셋',       city:'seoul'     },
  { text:'오후 3시\n티타임',         sub:'#달콤함',     city:'tokyo'     },
  { text:'스트레스\n받을 때',        sub:'#진정',       city:'mosbach'   },
  { text:'운동 후\n수분 보충',       sub:'#데일리',     city:'barcelona' },
  { text:'카페인 없이\n마시고 싶어', sub:'#카페인프리', city:'barcelona' },
  { text:'일하면서\n마실 차',        sub:'#집중',       city:'seoul'     },
];

const grid = document.getElementById('sit-grid');
SITUATIONS.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'sit-btn';
  btn.innerHTML = `
    <div class="sit-btn-accent" style="background:${COLORS[s.city]}"></div>
    <span class="sit-btn-text">${s.text.replace('\n','<br>')}</span>
    <span class="sit-btn-sub">${s.sub}</span>
  `;
  btn.onclick = () => openResult(s.city);
  grid.appendChild(btn);
});

let currentUrl = '';

function openResult(key) {
  const d = TEAS[key];
  const ink     = d.dark ? '#1C1A17'              : '#ffffff';
  const inkSub  = d.dark ? 'rgba(28,26,23,0.5)'   : 'rgba(255,255,255,0.55)';
  const glassB  = d.dark ? 'rgba(255,255,255,0.95)': 'rgba(20,12,10,0.6)';
  const glassBd = d.dark ? 'rgba(0,0,0,0.08)'      : 'rgba(255,255,255,0.15)';
  const btnBd   = d.dark ? 'rgba(28,26,23,0.5)'    : 'rgba(255,255,255,0.7)';

  document.getElementById('r-bg').style.backgroundImage = `url(${IMG[key]})`;

  ['r-city','r-type-ko','r-type-en'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.color = ink;
  });
  // 로고: 밝은 배경 → 적갈색, 어두운 배경(바르셀로나) → 흰색
  const logo = document.getElementById('r-logo');
  if (logo) logo.style.filter = d.dark ? 'invert(1)' : 'none';
  document.querySelectorAll('.brew-title,.brew-text,.btn-back').forEach(el => el.style.color = ink);

  document.getElementById('r-divider').style.background = ink;

  document.getElementById('r-city').textContent    = d.city;
  document.getElementById('r-type-ko').textContent = d.typeKo;
  document.getElementById('r-type-en').textContent = d.typeEn;
  document.getElementById('r-hot').textContent     = d.hot;
  document.getElementById('r-ice').textContent     = d.ice;

  document.getElementById('r-tags').innerHTML = d.tags.map(t =>
    `<div class="r-tag-card" style="background:${glassB};border:1px solid ${glassBd};color:${ink}">${t}</div>`
  ).join('');

  const brew = document.getElementById('r-brew');
  brew.style.background = glassB;
  brew.style.border     = `1px solid ${glassBd}`;

  const btn = document.getElementById('r-btn');
  btn.style.color       = ink;
  btn.style.borderColor = btnBd;
  currentUrl = d.url;

  document.getElementById('select').classList.add('hide');
  document.getElementById('result').classList.add('open');
  document.getElementById('result').scrollTop = 0;
}

function closeResult() {
  document.getElementById('result').classList.remove('open');
  setTimeout(() => document.getElementById('select').classList.remove('hide'), 300);
}

function goShop() {
  if (currentUrl) window.open(currentUrl, '_blank');
  return false;
}
